<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">

<body>
    <dialog id="parcelInfo">
        <b>GLM_ID:</b>
        <p id="glm_id"></p>

        <b>National cadastral reference:</b>
        <p id="ku_ref"></p>

        <b>Cadastral unit code:</b>
        <p id="ku_code"></p>

        <b>Cadastral unit name:</b>
        <p id="ku_name"></p>

        <b>Parcel number:</b>
        <p id="parc_num"></p>

        <b>Area (m^2):</b>
        <p id="area"></p>

        <button onclick="document.getElementById('parcelInfo').close()">OK</button>
    </dialog>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        const URL = "http://localhost:8000"

        const map = L.map('map').setView([50.4372, 15.3516], 13); // Jičín

        L.tileLayer(
            'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 19
            }
        ).addTo(map);

        setTimeout(() => map.invalidateSize(), 100);

        map.on('moveend', async () => {
            onMove();
        });

        function onMove() {
            const bounds = map.getBounds();

            nelat = bounds._northEast.lat;
            nelng = bounds._northEast.lng;

            swlat = bounds._southWest.lat;
            swlng = bounds._southWest.lng;

            let xmlHttp = new XMLHttpRequest();
            xmlHttp.open("GET", URL + `/parcel?area=${swlng},${swlat},${nelng},${nelat}`, true);
            xmlHttp.onload = drawParcels;
            xmlHttp.send(null);
        }

        function drawParcels() {
            L.geoJSON(JSON.parse(this.responseText), {
                onEachFeature(feature, layer) {

                    layer.on('click', e => onParcelClick(e));
                }
            }).addTo(map);
        }

        function onParcelClick(e) {
            const id = e.target.feature.properties.id;

            let xmlHttp = new XMLHttpRequest();
            xmlHttp.open( "GET", URL + `/parcel/${id}`, true );
            xmlHttp.onload = function () {
                object = JSON.parse(this.responseText);

                document.getElementById("glm_id").innerText = object.gmlId;
                document.getElementById("ku_ref").innerText = object.nationalCadastralReference;
                document.getElementById("ku_code").innerText = object.cadastralUnitCode;
                document.getElementById("ku_name").innerText = object.cadastralUnitName;
                document.getElementById("parc_num").innerText = object.parcelNumber;
                document.getElementById("area").innerText = object.areaM2;

                document.getElementById("parcelInfo").showModal();
            };

            xmlHttp.send(null); 
        }
    </script>
</body>
</html>
